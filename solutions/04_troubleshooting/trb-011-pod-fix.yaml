apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: db-pvc
  namespace: data
spec:
  accessModes:
  - ReadWriteOnce
  storageClassName: local-storage
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Pod
metadata:
  name: db-app
  namespace: data
  labels:
    app: db-app
spec:
  containers:
  - name: db
    image: nginx
    volumeMounts:
    - name: data-volume
      mountPath: /data
    ports:
    - containerPort: 80
  volumes:
  - name: data-volume
    persistentVolumeClaim:
      claimName: db-pvc
