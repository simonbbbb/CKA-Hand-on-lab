apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: local-storage
provisioner: rancher.io/local-path    # FIXED: was 'kubernetes.io/no-provisioner'
parameters:
  path: /opt/local-path-provisioner
reclaimPolicy: Delete
volumeBindingMode: WaitForFirstConsumer
