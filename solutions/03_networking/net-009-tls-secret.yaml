# Self-signed TLS certificate for Gateway API lab
# In the real exam, you can generate one with:
#   openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
#     -keyout tls.key -out tls.crt -subj "/CN=example.com"
#   kubectl create secret tls app-tls-secret --cert=tls.crt --key=tls.key --dry-run=client -o yaml
apiVersion: v1
kind: Secret
metadata:
  name: app-tls-secret
  namespace: networking
type: kubernetes.io/tls
data:
  tls.crt: 
  tls.key: 
