# HTTPRoute for HTTP-to-HTTPS redirect on /secure
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: secure-redirect
  namespace: networking
spec:
  parentRefs:
  - name: secure-gateway
    sectionName: http
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /secure
    filters:
    - type: RequestRedirect
      requestRedirect:
        scheme: https
        statusCode: 301
---
# HTTPRoute for backend routing on HTTPS listener
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: backend-routing
  namespace: networking
spec:
  parentRefs:
  - name: secure-gateway
    sectionName: https
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /api
    backendRefs:
    - name: api-service
      port: 8080
  - matches:
    - path:
        type: PathPrefix
        value: /web
    backendRefs:
    - name: web-service
      port: 80
